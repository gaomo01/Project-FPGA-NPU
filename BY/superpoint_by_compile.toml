[parse]
net_name = "superpoint_test_softmax"
framework = "onnx"
inputs = [ 1, 480, 640, 1]
inputs_layout = "NHWC"
pre_method = "nop"
pre_scale = [ 1.0]
pre_mean = [ 0.0]
channel_swap = [ 0]
network = "../superpoint_test_softmax.onnx"
jr_path = "build/"
target = "buyi"

[optimize]
target = "buyi"
json = "build/superpoint_test_softmax_parsed.json"
raw = "build/superpoint_test_softmax_parsed.raw"
jr_path = "build/"

[quantize]
forward_mode = "image"
saturation = "kld"
forward_dir = "../qtset"
forward_list = "../qtset/list.txt"
qdtype = "int8"
json = "build/superpoint_test_softmax_optimized.json"
raw = "build/superpoint_test_softmax_optimized.raw"
jr_path = "build/"
per = "channel"
target = "buyi"

[adapt]
target = "buyi"
json = "build/superpoint_test_softmax_quantized.json"
raw = "build/superpoint_test_softmax_quantized.raw"
jr_path = "build/"

[generate]
json = "build/superpoint_test_softmax_adapted.json"
raw = "build/superpoint_test_softmax_adapted.raw"
jr_path = "build/"
log_path = "build/logs/"
no_mergeops = true
etmopt = 0
